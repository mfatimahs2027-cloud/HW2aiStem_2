<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Animals from Land, Mountains and the Sea</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">

      <div class="logo">
        <a href="index.html">Animals from Land, Mountains and the Sea</a>
      </div>

      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <!-- THEME TOGGLE BUTTON -->
      <button class="theme-toggle">🌑</button>

    </div>
  </header>

  <main>

    <!-- PAGE TITLE -->
    <section class="page-title section fade-in scroll-animate">
      <div class="container">
        <h1>Contact</h1>
        <p>Have a question or want to reach out? Send a message below.</p>
      </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="contact-section section slide-up scroll-animate">
      <div class="container">

        <form class="contact-form">

          <div class="form-group">
            <label for="name">Name:</label>
            <input id="name" type="text" name="name" placeholder="Your Name">
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input id="email" type="email" name="email" placeholder="Your Email">
          </div>

          <div class="form-group">
            <label for="subject">Subject:</label>
            <input id="subject" type="text" name="subject" placeholder="What's the subject?">
          </div>

          <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Your message"></textarea>
          </div>

          <button type="submit">Submit</button>

        </form>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Animals from Land, Mountains and the Sea. By Mahnoor Fatima All rights reserved.</p>
    </div>
  </footer>

  <!-- THEME TOGGLE + SCROLL ANIMATIONS -->
  <script>
    /* THEME TOGGLE */
    const themeToggle = document.querySelector('.theme-toggle');

    function updateThemeIcon() {
      if (document.body.classList.contains('purple-theme')) {
        themeToggle.textContent = '🌕';
      } else {
        themeToggle.textContent = '🌑';
      }
    }

    updateThemeIcon();

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('purple-theme');
      updateThemeIcon();
    });

    /* PAGE LOAD ANIMATION */
    document.body.classList.add('page-load');

    /* SCROLL ANIMATIONS */
    const animatedElements = document.querySelectorAll('.scroll-animate');

    function checkVisibility() {
      animatedElements.forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
          el.classList.add('visible');
        } else {
          el.classList.remove('visible');
        }
      });
    }

    window.addEventListener('scroll', checkVisibility);
    window.addEventListener('load', checkVisibility);
  </script>

</body>
</html>
