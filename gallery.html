<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Animals from Land, Mountains and the Sea</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">

      <div class="logo">
        <a href="index.html">Animals from Land, Mountains and the Sea</a>
      </div>

      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <!-- THEME TOGGLE BUTTON -->
      <button class="theme-toggle">🌑</button>

    </div>
  </header>

  <main>

    <!-- PAGE TITLE -->
    <section class="page-title section fade-in scroll-animate">
      <div class="container">
        <h1>Gallery</h1>
        <p>A collection of animals from land, mountains, and the sea.</p>
      </div>
    </section>

    <!-- IMAGE GRID -->
    <section class="gallery-grid-section section slide-up scroll-animate">
      <div class="container">

        <div class="gallery-grid">

          <img src="https://i.pinimg.com/736x/35/1e/4b/351e4b28fae5fff4db8e45a79b318efc.jpg" alt="Animal image 1">
          <img src="https://i.pinimg.com/736x/c2/75/db/c275dbe5457bb4accc75495a6a4e9c12.jpg" alt="Animal image 2">
          <img src="https://i.pinimg.com/736x/e7/5d/c0/e75dc0e5ce848fc196a7b4d4a5200eda.jpg" alt="Animal image 3">

          <img src="https://i.pinimg.com/1200x/9d/ca/92/9dca923569c09e38afdc154cbb208159.jpg" alt="Animal image 4">
          <img src="https://i.pinimg.com/736x/5f/49/c3/5f49c323aee6f2c6f9bcf81920c53223.jpg" alt="Animal image 5">
          <img src="https://i.pinimg.com/736x/67/60/d6/6760d60119b5c8f5837d22222689fbc6.jpg" alt="Animal image 6">

          <img src="https://i.pinimg.com/1200x/82/19/4b/82194b173ad0f7d4abd9ae68b315e52f.jpg" alt="Animal image 7">
          <img src="https://i.pinimg.com/736x/0e/31/91/0e3191632313259cc2c4a9662a86f0bd.jpg" alt="Animal image 8">
          <img src="https://i.pinimg.com/736x/c6/8e/c8/c68ec89982d19370e137de045e8f65da.jpg" alt="Animal image 9">

        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Animals from Land, Mountains and the Sea. By Mahnoor Fatima All rights reserved.</p>
    </div>
  </footer>

  <!-- THEME TOGGLE + SCROLL ANIMATIONS -->
  <script>
    /* THEME TOGGLE */
    const themeToggle = document.querySelector('.theme-toggle');

    function updateThemeIcon() {
      if (document.body.classList.contains('purple-theme')) {
        themeToggle.textContent = '🌕';
      } else {
        themeToggle.textContent = '🌑';
      }
    }

    updateThemeIcon();

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('purple-theme');
      updateThemeIcon();
    });

    /* PAGE LOAD ANIMATION */
    document.body.classList.add('page-load');

    /* SCROLL ANIMATIONS */
    const animatedElements = document.querySelectorAll('.scroll-animate');

    function checkVisibility() {
      animatedElements.forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
          el.classList.add('visible');
        } else {
          el.classList.remove('visible');
        }
      });
    }

    window.addEventListener('scroll', checkVisibility);
    window.addEventListener('load', checkVisibility);
  </script>

</body>
</html>
